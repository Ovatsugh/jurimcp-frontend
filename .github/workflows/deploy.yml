# ============================================================================
# JuridiA — Frontend Angular: Build & Deploy
# ============================================================================
# Repositório: jurimcp-frontend
# Stack: Angular 21 + Nginx + Docker
# VPS: Hostinger (via SSH)
#
# GitHub Secrets necessários:
#   SSH_PRIVATE_KEY       — Private key para acesso SSH à VPS
#   SSH_HOST              — IP da VPS
#   SSH_USER              — Usuário SSH (root)
#   PERSONAL_ACCESS_TOKEN — GitHub PAT (repo privado)
# ============================================================================

name: Build & Deploy

on:
  push:
    branches:
      - main

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ──────────────────────────────────────────────────────────────────────────
  # Job 1: Build da imagem Docker e push pro GitHub Container Registry
  # ──────────────────────────────────────────────────────────────────────────
  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ──────────────────────────────────────────────────────────────────────────
  # Job 2: Deploy na VPS via SSH
  # ──────────────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Copia docker-compose.yml para a VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          source: "docker-compose.yml"
          target: "/opt/juridia-frontend"

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          script: |
            set -e
            REPO_LOWER="$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')"

            # ── 1. Login no GHCR ──
            echo "${{ secrets.PERSONAL_ACCESS_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            # ── 2. Garante estrutura de diretórios ──
            mkdir -p /opt/juridia-frontend
            cd /opt/juridia-frontend

            # ── 3. Monta o .env ──
            printf '%s\n' \
              "COMPOSE_IMAGE=${REPO_LOWER}" \
              > .env

            # ── 4. Pull e deploy ──
            IMAGE="ghcr.io/${REPO_LOWER}:latest"
            docker pull "$IMAGE"
            docker compose up -d --remove-orphans

            # ── 5. Aguarda container ficar running ──
            echo "Aguardando container..."
            for i in $(seq 1 15); do
              STATUS=$(docker inspect --format='{{.State.Status}}' juridia-frontend 2>/dev/null || echo "missing")
              if [ "$STATUS" = "running" ]; then
                echo "Container running!"
                break
              fi
              if [ "$i" -eq 15 ]; then
                echo "Container não ficou running. Logs:"
                docker logs --tail 30 juridia-frontend
                exit 1
              fi
              sleep 2
            done

            # ── 6. Limpeza ──
            docker image prune -f
