<div class="min-h-screen bg-void bg-dot-grid flex items-stretch relative overflow-hidden">

  <!-- Ambient glow -->
  <div class="absolute inset-0 pointer-events-none"
       style="background: radial-gradient(ellipse at 28% 55%, rgba(201,162,83,0.045) 0%, transparent 58%)"></div>

  <!-- Left branding panel -->
  <aside class="hidden lg:flex flex-col justify-between w-[44%] flex-shrink-0 border-r border-stroke/40 px-14 py-12 relative z-10">
    <div class="flex items-center gap-3 anim-fade-in">
      <div class="w-5 h-5 border border-gold/65 rotate-45"></div>
      <span class="font-display text-2xl text-text tracking-[0.2em] uppercase">JuriMCP</span>
    </div>

    <div class="anim-fade-up delay-200">
      <div class="gold-line mb-8"></div>
      <h2 class="font-display text-[3.2rem] text-text leading-[1.05] mb-5">
        Bem-vindo<br>de volta.
      </h2>
      <p class="text-muted text-[13px] leading-relaxed max-w-[300px]">
        Acesse o painel para gerenciar suas API Keys e integrar o MCP Server da JuriMCP.
      </p>
    </div>

    <p class="text-dim text-xs anim-fade-in delay-300">© 2026 JuriMCP</p>
  </aside>

  <!-- Right form panel -->
  <div class="flex-1 flex flex-col items-center justify-center px-6 py-16 relative z-10">

    <!-- Mobile logo -->
    <div class="flex items-center gap-3 mb-12 lg:hidden anim-fade-in">
      <div class="w-5 h-5 border border-gold/65 rotate-45"></div>
      <span class="font-display text-2xl text-text tracking-[0.2em] uppercase">JuriMCP</span>
    </div>

    <div class="w-full max-w-[340px]">
      <p class="text-gold tracking-[0.32em] text-[11px] uppercase mb-3 anim-fade-up">Acesso</p>
      <h1 class="font-display text-[2.6rem] text-text mb-2 anim-fade-up delay-100">Entrar</h1>
      <p class="text-muted text-[13px] mb-10 anim-fade-up delay-100">
        Novo por aqui?
        <a routerLink="/register" class="text-gold hover:underline underline-offset-2 ml-1">Criar uma conta</a>
      </p>

      <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="space-y-5">

        <div class="anim-fade-up delay-200">
          <label for="email" class="block text-[11px] text-muted uppercase tracking-[0.12em] mb-2">Email</label>
          <input
            id="email"
            type="email"
            formControlName="email"
            autocomplete="email"
            placeholder="seu@email.com"
            class="field"
            [class.is-error]="loginForm.get('email')?.invalid && loginForm.get('email')?.touched">
          <span *ngIf="loginForm.get('email')?.invalid && loginForm.get('email')?.touched" class="error-msg">
            Email é obrigatório
          </span>
        </div>

        <div class="anim-fade-up delay-300">
          <label for="password" class="block text-[11px] text-muted uppercase tracking-[0.12em] mb-2">Senha</label>
          <input
            id="password"
            type="password"
            formControlName="password"
            autocomplete="current-password"
            placeholder="••••••••"
            class="field"
            [class.is-error]="loginForm.get('password')?.invalid && loginForm.get('password')?.touched">
          <span *ngIf="loginForm.get('password')?.invalid && loginForm.get('password')?.touched" class="error-msg">
            Senha é obrigatória
          </span>
        </div>

        <div *ngIf="error" class="text-fail text-[13px] py-2.5 px-4 bg-fail/5 border border-fail/20 rounded-md">
          {{ error }}
        </div>

        <div class="pt-2 anim-fade-up delay-400">
          <button type="submit" [disabled]="loginForm.invalid || loading" class="btn-primary">
            {{ loading ? 'Entrando...' : 'Entrar' }}
          </button>
        </div>

      </form>
    </div>
  </div>

</div>
